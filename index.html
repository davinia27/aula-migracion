<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aula Migración PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{margin:0;background:#0f172a;font-family:sans-serif}
.screen{display:none;padding:20px;color:black;background:white;height:100vh}
.screen.active{display:block}

.footer{
position:absolute;
bottom:10px;
left:20px;
display:flex;
gap:20px
}
.footer img{height:35px}

button{padding:10px 20px;background:black;color:white;border-radius:10px}
input,textarea,select{width:100%;padding:10px;margin:5px 0}

/* CARTAS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{
border:3px solid black;
border-radius:15px;
padding:10px;
cursor:pointer;
background:#f1f5f9;
transition:.2s
}
.card:hover{background:#e0e7ff}
.selected{background:#4f46e5;color:white}

/* BOLA */
#ball{
width:200px;height:200px;border-radius:50%;
background:radial-gradient(#6366f1,#000);
display:flex;align-items:center;justify-content:center;
color:white;font-size:20px;margin:auto
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="v1" class="screen active">
<h1>Curso Migración</h1>
<button onclick="go('v2')">Empezar</button>
</div>

<!-- BOLA -->
<div id="v2" class="screen">
<h2>Bola Mágica</h2>

<input id="name" placeholder="Nombre">
<input id="obj" placeholder="Objeto">
<input id="qual" placeholder="Cualidades">

<button onclick="add()">Añadir</button>
<button onclick="groups()">Crear grupos</button>

<div id="ball">🔮</div>
<div id="table"></div>

<button onclick="go('v3')">Siguiente</button>
</div>

<!-- RULETA -->
<div id="v3" class="screen">
<h2>Ruleta</h2>
<canvas id="wheel" width="300" height="300"></canvas>
<button onclick="spin()">Girar</button>
<div id="result"></div>
<button onclick="go('v4')">Siguiente</button>
</div>

<!-- PIN -->
<div id="v4" class="screen">
<h2>Acceso grupos</h2>
<button onclick="login(1)">G1</button>
<button onclick="login(2)">G2</button>
<button onclick="login(3)">G3</button>
<button onclick="login(4)">G4</button>
<button onclick="login(5)">G5</button>
</div>

<!-- FICHA MODO JUEGO -->
<div id="v5" class="screen">
<h2>Ficha del personaje (modo juego)</h2>

<div class="cards">

<div class="card" onclick="select(this,'llegada','avion')">✈️ Avión</div>
<div class="card" onclick="select(this,'llegada','patera')">🛶 Patera</div>
<div class="card" onclick="select(this,'llegada','visado')">📄 Visado</div>

<div class="card" onclick="select(this,'objetivo','trabajo')">💼 Trabajo</div>
<div class="card" onclick="select(this,'objetivo','estudios')">🎓 Estudios</div>
<div class="card" onclick="select(this,'objetivo','proteccion')">🛡️ Protección</div>

<div class="card" onclick="select(this,'situacion','asilo')">📄 Asilo</div>
<div class="card" onclick="select(this,'situacion','irregular')">⚠️ Irregular</div>
<div class="card" onclick="select(this,'situacion','erasmus')">🌍 Erasmus</div>

</div>

<textarea placeholder="Historia del personaje"></textarea>

<button onclick="alert('Expediente creado')">Finalizar</button>
</div>

<!-- FOOTER LOGOS -->
<div class="footer">
<img src="logo1.png">
<img src="logo2.png">
</div>

<script>

let people=[]
let groupsData=[[],[],[],[],[]]
let pins=["G1AISA","G2AISA","G3AISA","G4AISA","G5AISA"]

function go(v){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(v).classList.add("active")
}

/* BOLA */
function add(){
let n=name.value
if(!n)return
people.push(n)
ball.innerHTML=n
}

/* GRUPOS */
function groups(){
groupsData=[[],[],[],[],[]]
people.forEach((p,i)=>groupsData[i%5].push(p))

let html=""
groupsData.forEach((g,i)=>{
g.forEach(p=>html+=`<div>${p} → G${i+1}</div>`)
})
table.innerHTML=html
}

/* RULETA */
let colors=["#1d4ed8","#ea580c","#db2777","#0f172a","#7c3aed"]
let countries=["Colombia","Venezuela","Cuba","Senegal","Canadá"]

function draw(){
let c=wheel.getContext("2d")
let a=2*Math.PI/countries.length
countries.forEach((p,i)=>{
c.beginPath()
c.moveTo(150,150)
c.arc(150,150,140,i*a,(i+1)*a)
c.fillStyle=colors[i]
c.fill()
})
}
draw()

function spin(){
let r=Math.floor(Math.random()*countries.length)
result.innerHTML=countries[r]
confetti()
}

/* PIN */
function login(g){
let p=prompt("Introduce PIN")
if(p===pins[g-1]) go("v5")
else alert("Incorrecto")
}

/* CARTAS */
let state={}
function select(el,type,val){
document.querySelectorAll(".card").forEach(c=>{
if(c.onclick.toString().includes(type)) c.classList.remove("selected")
})
el.classList.add("selected")
state[type]=val
}

</script>

</body>
</html>
